      <stop offset="0.6" stop-color="#38BDF8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strand-a" x1="96" y1="48" x2="160" y2="208" gradientUnits="userSpaceOnUse">
