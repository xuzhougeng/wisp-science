<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wisp Terminal</title>
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <link rel="stylesheet" href="/terminal.css" />
  </head>
  <body>
    <header class="terminal-header">
      <div class="terminal-identity">
        <span id="terminal-status" class="terminal-status" aria-hidden="true"></span>
        <strong id="terminal-title">Terminal</strong>
        <span id="terminal-context"></span>
        <span id="terminal-cwd"></span>
      </div>
      <div class="terminal-actions">
        <button id="terminal-pin" type="button" aria-pressed="false" title="Keep on top">Pin</button>
        <button id="terminal-terminate" type="button" class="danger" title="Terminate terminal session">Terminate</button>
      </div>
    </header>
    <main id="terminal-container" aria-label="Interactive terminal"></main>
    <div id="terminal-error" role="alert" hidden></div>
    <script type="module" src="/terminal.js"></script>
  </body>
</html>
